<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Box Status</title>
    <style>
        body {
            background-color: rgb(145, 134, 134);
            color: rgb(20, 4, 248);
            font-family: Helvetica Neue, Arial, sans-serif;
        
        }
        header {
            background-color: rgb(0, 0, 0);
            color: rgb(255, 255, 255);
            padding: 0;
            margin: 0;
            text-align: center;
        }
        h1 {
            color: rgb(255, 0, 98);
        }
        h2 {
            color: rgba(0, 0, 0, 0.603);
        }
        button {
            background-color: rgb(0, 0, 0);
            color: rgb(255, 255, 255); 
            font-size: 25px;

        }
        p {
            display: inline-block; 
            margin: 60px;
            font-size: 25px;
        }
        img {
            display: block;
            margin: 0 auto;
            max-width: 100%;
            height: auto;
        }
    </style>
</head>
<body>
    <header>
        <h1><a href="../index.html">Home</a>: Box 01</h1>
    </header>
    <section class="features">
        <img src="../images/1.1.jpeg" alt="Box 01"> 
    </section>
        <select id="location" name="Location">
        <option value="">Select a location</option>
        <option value="Living Room">Living Room</option>
        <option value="Bedroom">Bedroom</option>
        <option value="Kitchen">Kitchen</option>
    </select>
    <script>
const locationSelect = document.getElementById("location");

// Load previously selected value
const savedLocation = localStorage.getItem("location");
if (savedLocation) {
    locationSelect.value = savedLocation;
}

// Save whenever the selection changes
locationSelect.addEventListener("change", function () {
    localStorage.setItem("location", this.value);
});
</script>
    </body>
</html>
